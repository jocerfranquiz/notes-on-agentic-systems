<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="-apple-system, system-ui, Segoe UI, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#4b5563"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="760" fill="#fafafa"/>

  <!-- Title -->
  <text x="600" y="32" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">LLM Agent Architecture</text>
  <text x="600" y="52" text-anchor="middle" font-size="12" fill="#6b7280">interface · orchestrator · (LLM ↔ memory ↔ tools) · environment + cross-cutting concerns</text>

  <!-- =================== MAIN FLOW =================== -->

  <!-- 1. Interface -->
  <rect x="60" y="80" width="760" height="64" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="440" y="108" text-anchor="middle" font-size="16" font-weight="600" fill="#0c4a6e">Interface Layer</text>
  <text x="440" y="128" text-anchor="middle" font-size="12" fill="#075985">User · Chat UI · API · Streaming · Other agents (MCP)</text>

  <!-- 2. Orchestrator -->
  <rect x="60" y="178" width="760" height="150" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="440" y="204" text-anchor="middle" font-size="16" font-weight="600" fill="#78350f">Orchestrator  ·  the agent loop</text>

  <g font-size="11" fill="#78350f">
    <rect x="80" y="220" width="130" height="44" rx="6" fill="#fef9e8" stroke="#d97706"/>
    <text x="145" y="238" text-anchor="middle" font-weight="600">1. Assemble</text>
    <text x="145" y="254" text-anchor="middle">context</text>

    <rect x="225" y="220" width="130" height="44" rx="6" fill="#fef9e8" stroke="#d97706"/>
    <text x="290" y="238" text-anchor="middle" font-weight="600">2. Call LLM</text>
    <text x="290" y="254" text-anchor="middle">reason / plan</text>

    <rect x="370" y="220" width="130" height="44" rx="6" fill="#fef9e8" stroke="#d97706"/>
    <text x="435" y="238" text-anchor="middle" font-weight="600">3. Parse</text>
    <text x="435" y="254" text-anchor="middle">tool call?</text>

    <rect x="515" y="220" width="130" height="44" rx="6" fill="#fef9e8" stroke="#d97706"/>
    <text x="580" y="238" text-anchor="middle" font-weight="600">4. Dispatch</text>
    <text x="580" y="254" text-anchor="middle">+ observe</text>

    <rect x="660" y="220" width="140" height="44" rx="6" fill="#fef9e8" stroke="#d97706"/>
    <text x="730" y="238" text-anchor="middle" font-weight="600">5. Check done</text>
    <text x="730" y="254" text-anchor="middle">budget / steps</text>

    <!-- loop arrow under steps -->
    <path d="M 730 268 Q 730 295 145 295 L 145 270" fill="none" stroke="#d97706" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
    <text x="440" y="312" text-anchor="middle" font-size="11" font-style="italic" fill="#92400e">loop until done</text>
  </g>

  <!-- 3. Three pillars: LLM | Memory | Tools -->

  <!-- LLM -->
  <rect x="60" y="362" width="240" height="180" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="180" y="388" text-anchor="middle" font-size="15" font-weight="600" fill="#4c1d95">LLM  ·  Reasoning</text>
  <g font-size="11" fill="#5b21b6">
    <text x="78" y="412">• Base model(s) + router</text>
    <text x="78" y="430">• System prompt / role</text>
    <text x="78" y="448">• Decoding params</text>
    <text x="78" y="466">• Structured output / schema</text>
    <text x="78" y="484">• Tool-use mode</text>
    <text x="78" y="510" font-style="italic" fill="#6d28d9">Patterns: ReAct, Plan-Exec,</text>
    <text x="78" y="525" font-style="italic" fill="#6d28d9">Reflexion, Tree-of-Thoughts,</text>
    <text x="78" y="540" font-style="italic" fill="#6d28d9">multi-agent</text>
  </g>

  <!-- Memory -->
  <rect x="320" y="362" width="240" height="180" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="440" y="388" text-anchor="middle" font-size="15" font-weight="600" fill="#14532d">Memory</text>
  <g font-size="11" fill="#166534">
    <text x="338" y="412">• Working (context window)</text>
    <text x="338" y="430">• Episodic (past sessions)</text>
    <text x="338" y="448">• Semantic (RAG / vectors)</text>
    <text x="338" y="466">• Procedural (skills, recipes)</text>
    <text x="338" y="484">• User profile</text>
    <text x="338" y="510" font-style="italic" fill="#15803d">Ops: write · retrieve ·</text>
    <text x="338" y="525" font-style="italic" fill="#15803d">rerank · summarize · forget</text>
  </g>

  <!-- Tools -->
  <rect x="580" y="362" width="240" height="180" rx="10" fill="#fce7f3" stroke="#db2777" stroke-width="2"/>
  <text x="700" y="388" text-anchor="middle" font-size="15" font-weight="600" fill="#831843">Tools</text>
  <g font-size="11" fill="#9f1239">
    <text x="598" y="412">• Web search · RAG retriever</text>
    <text x="598" y="430">• Code exec · shell · files</text>
    <text x="598" y="448">• HTTP · SQL · databases</text>
    <text x="598" y="466">• Sub-agents · communication</text>
    <text x="598" y="484">• Meta: ask user, approve</text>
    <text x="598" y="510" font-style="italic" fill="#be185d">Each: name, schema,</text>
    <text x="598" y="525" font-style="italic" fill="#be185d">description, permissions</text>
  </g>

  <!-- 4. Environment -->
  <rect x="60" y="582" width="760" height="78" rx="10" fill="#f3f4f6" stroke="#4b5563" stroke-width="2"/>
  <text x="440" y="610" text-anchor="middle" font-size="15" font-weight="600" fill="#1f2937">Environment</text>
  <text x="440" y="630" text-anchor="middle" font-size="11" fill="#374151">Filesystem · Shell · Browser · APIs · Databases · Other agents · Physical devices</text>
  <text x="440" y="648" text-anchor="middle" font-size="11" font-style="italic" fill="#6b7280">sandboxed · idempotent · reversible where possible</text>

  <!-- =================== ARROWS =================== -->

  <!-- Interface <-> Orchestrator -->
  <line x1="420" y1="144" x2="420" y2="176" stroke="#4b5563" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="460" y1="176" x2="460" y2="144" stroke="#4b5563" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="486" y="164" font-size="10" fill="#4b5563">goal ⇄ result</text>

  <!-- Orchestrator <-> LLM -->
  <line x1="170" y1="328" x2="170" y2="360" stroke="#4b5563" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="190" y1="360" x2="190" y2="328" stroke="#4b5563" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Orchestrator <-> Memory -->
  <line x1="430" y1="328" x2="430" y2="360" stroke="#4b5563" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="450" y1="360" x2="450" y2="328" stroke="#4b5563" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Orchestrator <-> Tools -->
  <line x1="690" y1="328" x2="690" y2="360" stroke="#4b5563" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="710" y1="360" x2="710" y2="328" stroke="#4b5563" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Tools <-> Environment -->
  <line x1="690" y1="542" x2="690" y2="580" stroke="#4b5563" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="710" y1="580" x2="710" y2="542" stroke="#4b5563" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="728" y="565" font-size="10" fill="#4b5563">act ⇄ observe</text>

  <!-- =================== CROSS-CUTTING (right column) =================== -->

  <text x="1000" y="72" text-anchor="middle" font-size="13" font-weight="700" fill="#7f1d1d">Cross-cutting concerns</text>
  <text x="1000" y="88" text-anchor="middle" font-size="10" font-style="italic" fill="#9f1239">apply to every layer above</text>

  <!-- Bracket spanning all 4 boxes -->
  <path d="M 850 110 Q 840 110 840 130 L 840 690 Q 840 710 850 710" fill="none" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- Guardrails -->
  <rect x="860" y="100" width="280" height="135" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="1000" y="124" text-anchor="middle" font-size="14" font-weight="600" fill="#7f1d1d">Guardrails &amp; Safety</text>
  <g font-size="11" fill="#991b1b">
    <text x="878" y="146">• Input filters (PII, injection)</text>
    <text x="878" y="164">• Output validation</text>
    <text x="878" y="182">• Tool permissions / allow-list</text>
    <text x="878" y="200">• Sandboxing</text>
    <text x="878" y="218">• Human approval gates</text>
  </g>

  <!-- Observability -->
  <rect x="860" y="250" width="280" height="135" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="1000" y="274" text-anchor="middle" font-size="14" font-weight="600" fill="#7f1d1d">Observability</text>
  <g font-size="11" fill="#991b1b">
    <text x="878" y="296">• Traces of every step</text>
    <text x="878" y="314">• Token / cost / latency metrics</text>
    <text x="878" y="332">• Replay &amp; regression</text>
    <text x="878" y="350">• OpenTelemetry GenAI</text>
    <text x="878" y="368">• LangSmith / Phoenix / Langfuse</text>
  </g>

  <!-- State & Persistence -->
  <rect x="860" y="400" width="280" height="135" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="1000" y="424" text-anchor="middle" font-size="14" font-weight="600" fill="#7f1d1d">State &amp; Persistence</text>
  <g font-size="11" fill="#991b1b">
    <text x="878" y="446">• Session store</text>
    <text x="878" y="464">• Checkpoints (resumable runs)</text>
    <text x="878" y="482">• Artifact store</text>
    <text x="878" y="500">• Job queue / scheduler</text>
    <text x="878" y="518">• Caches (prompt, embedding)</text>
  </g>

  <!-- Evaluation -->
  <rect x="860" y="550" width="280" height="135" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="1000" y="574" text-anchor="middle" font-size="14" font-weight="600" fill="#7f1d1d">Evaluation</text>
  <g font-size="11" fill="#991b1b">
    <text x="878" y="596">• Offline golden test suites</text>
    <text x="878" y="614">• Online metrics / A/B tests</text>
    <text x="878" y="632">• LLM-as-judge rubrics</text>
    <text x="878" y="650">• Trajectory scoring</text>
    <text x="878" y="668">• User feedback signals</text>
  </g>

  <!-- Footer -->
  <text x="600" y="735" text-anchor="middle" font-size="10" fill="#9ca3af">The LLM is stateless — the orchestrator loop, memory, and tools give the agent its agency.</text>
</svg>
